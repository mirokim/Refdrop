<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RefDrop</title>
<style>
  :root {
    --bg: #0e0e0e; --surface: #161616; --border: #242424;
    --text: #e8e8e8; --dim: #666; --dimmer: #333;
    --green: #4a9; --red: #c55;
    --mono: "DM Mono", "Courier New", monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 240px;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 13px;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Top bar ── */
  .topbar {
    display: flex; align-items: center; gap: 9px;
    padding: 12px 14px 10px;
    border-bottom: 1px solid var(--border);
  }
  .logo { width: 18px; height: 18px; object-fit: contain; opacity: .9; }
  .wordmark { font-weight: 600; font-size: 14px; color: var(--text); }
  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    margin-left: auto; flex-shrink: 0;
  }
  .dot.on  { background: #3c4; box-shadow: 0 0 6px rgba(60,200,80,.5); }
  .dot.off { background: #555; }

  /* ── Body ── */
  .body { padding: 14px; }

  /* plan badge */
  .plan-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .plan-badge {
    font-family: var(--mono); font-size: 10px; letter-spacing: 1px;
    border: 1px solid var(--border); border-radius: 4px;
    padding: 3px 8px; color: var(--text); background: var(--surface);
  }
  .plan-badge.pro { border-color: #555; color: #ddd; }

  /* stat rows */
  .sep { height: 1px; background: var(--border); margin: 0 0 12px; }
  .stat { display: flex; justify-content: space-between; margin-bottom: 7px; }
  .stat-label { color: var(--dim); font-size: 12px; }
  .stat-val { font-family: var(--mono); font-size: 12px; color: #888; }
  .stat-val.green { color: var(--green); }
  .stat-val.red   { color: var(--red); }

  /* ── Limit reached state ── */
  .limit-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    margin-top: 4px;
    display: none;
  }
  .limit-box.visible { display: block; }
  .limit-msg { font-size: 12px; color: var(--dim); line-height: 1.55; margin-bottom: 12px; }
  .buy-btn {
    display: block; width: 100%; padding: 8px;
    background: var(--text); color: #000;
    border: none; border-radius: 6px;
    font-size: 12px; font-weight: 600;
    cursor: pointer; text-align: center; text-decoration: none;
    margin-bottom: 10px;
  }
  .buy-btn:hover { background: #ccc; }

  .key-label { font-size: 11px; color: var(--dim); margin-bottom: 5px; }
  .key-row { display: flex; gap: 6px; }
  .key-input {
    flex: 1; background: var(--bg); border: 1px solid var(--border);
    border-radius: 5px; color: var(--text);
    font-family: var(--mono); font-size: 11px;
    padding: 6px 8px; outline: none;
  }
  .key-input:focus { border-color: #444; }
  .key-btn {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 5px; color: var(--text);
    font-size: 11px; padding: 6px 10px; cursor: pointer; white-space: nowrap;
  }
  .key-btn:hover { border-color: #555; }
  .key-status { font-family: var(--mono); font-size: 10px; margin-top: 5px; min-height: 14px; }
  .key-status.ok  { color: var(--green); }
  .key-status.err { color: var(--red); }

  /* ── PRO license state (shown in body when PRO) ── */
  .license-row { margin-top: 8px; }

  /* ── Footer ── */
  .footer {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 14px; border-top: 1px solid var(--border);
  }
  .footer-ver { font-family: var(--mono); font-size: 10px; color: var(--dimmer); }
  .footer-help { font-size: 11px; color: var(--dimmer); text-decoration: none; cursor: pointer; }
  .footer-help:hover { color: var(--dim); }

  /* ── Usage bar (FREE only) ── */
  .usage-bar-wrap {
    margin: 10px 0 4px;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .usage-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.3s ease, background 0.3s ease;
  }

  /* helper not installed warning */
  .warn { font-size: 11px; color: var(--red); margin-top: 8px; line-height: 1.5; }
</style>
</head>
<body>

<div class="topbar">
  <img class="logo" id="popup-logo" src="" alt="">
  <span class="wordmark">RefDrop</span>
  <div class="dot off" id="dot"></div>
</div>

<div class="body">
  <div class="plan-row">
    <span class="plan-badge" id="plan-badge">FREE</span>
    <span id="unlimited-label" style="display:none; font-family:monospace; font-size:12px; color:#4a9;">∞ Unlimited</span>
  </div>

  <div class="sep"></div>

  <!-- FREE: usage stats -->
  <div id="stats-free">
    <div class="stat">
      <span class="stat-label">Remaining</span>
      <span class="stat-val green" id="stat-remaining">—</span>
    </div>
    <div class="usage-bar-wrap">
      <div class="usage-bar-fill" id="usage-bar"></div>
    </div>
  </div>

  <!-- PRO: usage stats (simpler) -->
  <div id="stats-pro" style="display:none;">
    <div class="stat">
      <span class="stat-label">Sent total</span>
      <span class="stat-val" id="stat-total-pro">—</span>
    </div>
    <div class="stat">
      <span class="stat-label">License</span>
      <span class="stat-val green">✓ Active</span>
    </div>
  </div>

  <!-- Limit reached box (FREE only, shown when count >= 50) -->
  <div class="limit-box" id="limit-box">
    <p class="limit-msg">You've used all 50 free sends.<br>Upgrade once, use forever.</p>
    <a class="buy-btn" id="buy-link" href="#" target="_blank">Get PRO — $5 lifetime ↗</a>
    <div class="key-label">License key</div>
    <div class="key-row">
      <input class="key-input" id="key-input" type="text" placeholder="XXXX-XXXX-XXXX-XXXX" spellcheck="false">
      <button class="key-btn" id="key-btn">Activate</button>
    </div>
    <div class="key-status" id="key-status"></div>
  </div>

  <div class="warn" id="helper-warn" style="display:none;">
    ⚠ Helper app not installed.<br>
    <a href="#" id="helper-link" style="color:#c55;">Download installer ↗</a>
  </div>
</div>

<div class="footer">
  <span class="footer-ver">v0.1.0</span>
  <a class="footer-help" id="help-link" href="#" target="_blank">Help</a>
</div>

<script src="popup.js"></script>
</body>
</html>
